name: app
services:
  api:
    image: api-image:1.0.0
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        NODE_VERSION: "22.22.0"
        ALPINE_VERSION: "3.22"
    environment:
      DATABASE_URL: "postgresql://user:password@db:5432/mydb"
      NODE_VERSION: "22.22.0"
      NODE_ENV: production
      PORT: 8080
    container_name: api-container
    ports:
      - 8080:8080
    depends_on:
      - db

  db:
    image: postgres:latest
    container_name: db-container
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydb
    ports:
      - 5432:5432
    volumes:
      - db_data:/var/lib/postgresql
      - ./migrations:/docker-entrypoint-initdb.d

  migrate:
    image: postgres:latest
    container_name: migrate-container
    profiles:
      - tools
    depends_on:
      - db
    environment:
      DATABASE_URL: "postgresql://user:password@db:5432/mydb"
      MIGRATIONS_DIR: "/app/migrations"
    volumes:
      - ..:/app:ro
    working_dir: /app
    entrypoint: ["/bin/sh", "-c", "/app/scripts/migrations.sh"]

volumes:
  db_data:
